repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi]
  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c 'cd frontend && npx eslint "${@#frontend/}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx)$
      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c 'cd frontend && npx prettier --write "${@#frontend/}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|css|json)$
